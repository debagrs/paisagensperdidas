    <script>
   window.localStorage.clear(); if(window.localforage){window.localforage.clear();}
   webgazer.setGazeListener(function(data, elapsedTime) {
	if (data == null) {
		return;
	}
	var xprediction = data.x;
	var yprediction = data.y;
    var overlay = document.getElementById('animal-vision-overlay');
    if (overlay) {
        overlay.style.setProperty('--x', xprediction + 'px');
        overlay.style.setProperty('--y', yprediction + 'px');
    }
}).begin();
