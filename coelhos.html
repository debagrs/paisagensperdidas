  <style>

    body {

    #animal-vision-overlay {

      position: fixed;

      top: 0;
      left: 0;

      width: 100vw;
      height: 100vh;

      pointer-events: none;

      z-index: 999998;

      backdrop-filter:
        grayscale(0.6)
        sepia(0.2)
        hue-rotate(90deg)
        blur(2px)
        contrast(0.9);

      -webkit-backdrop-filter:
        grayscale(0.6)
        sepia(0.2)
        hue-rotate(90deg)
        blur(2px)
        contrast(0.9);

      mask-image:
        radial-gradient(
          circle 100px
          at var(--x, 50%) var(--y, 50%),
          transparent 0%,
          transparent 100px,
          black 101px
        );

      -webkit-mask-image:
        radial-gradient(
          circle 100px
          at var(--x, 50%) var(--y, 50%),
          transparent 0%,
          transparent 100px,
          black 101px
        );
    }


    #webgazerGazeDot {

    }

       WEBGAZER DOS COELHOS
  ========================================================== -->

  <script
    src="js/webgazercoelho.js"
    type="text/javascript"
  ></script>


  <script>

    window.localStorage.clear();


    if (window.localforage) {

      window.localforage.clear();

    }


    webgazer

      .setGazeListener(

        function (data, elapsedTime) {


          if (data == null) {

            return;

          }


          var xprediction =
            data.x;


          var yprediction =
            data.y;


          var overlay =
            document.getElementById(
              'animal-vision-overlay'
            );


          if (overlay) {


            overlay.style.setProperty(
              '--x',
              xprediction + 'px'
            );


            overlay.style.setProperty(
              '--y',
              yprediction + 'px'
            );

          }

        }

      )

      .begin();

  </script>
